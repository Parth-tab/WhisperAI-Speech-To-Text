name: PR Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Run Unit Tests
        run: pytest

      - name: Cache LLM Models
        uses: actions/cache@v3
        with:
          path: ~/.whisperai/models
          key: ${{ runner.os }}-whisperai-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-whisperai-models-

      - name: Deterministic ML Profiling Step
        run: pytest tests/profiling_test.py -v -s

      - name: Dry-Run Build
        run: pyinstaller WhisperAI.spec --clean
