name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How do we reproduce the issue?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Application Logs
      description: |
        Please provide the contents of your log file.
        You can find it at `%USERPROFILE%\.whisperai\logs\whisperai.log`.
      render: text
    validations:
      required: true
